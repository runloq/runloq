  <head>

    <!-- Flash prevention: apply .dark class synchronously before any CSS renders.
         Reads localStorage.theme ('dark'|'light'). Falls back to prefers-color-scheme.
         Must be the first script in <head> — no defer/async. -->
    <script>
      (function () {
        var s = localStorage.getItem('runloq.theme');
        if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else if (s === 'light') {
          // Explicit light preference: add .light so :root:not(.light) media
          // query fallback doesn't re-apply dark tokens.
          document.documentElement.classList.add('light');
        }
      })();
    </script>
