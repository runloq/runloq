name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Run tests
        run: |
          python -m pytest tests/ dashboard/api/tests/ -v --tb=short

  build-and-publish:
    name: Build wheel and publish
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dashboard SPA
        working-directory: dashboard/web
        run: |
          npm ci
          npm run build

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel (SPA already in dashboard/web/dist/)
        run: python -m build

      - name: Verify SPA is in wheel
        run: |
          WHL=$(ls dist/*.whl | head -1)
          echo "Checking wheel: $WHL"
          unzip -l "$WHL" | grep "dashboard/web/dist" | head -5
          COUNT=$(unzip -l "$WHL" | grep -c "dashboard/web/dist" || true)
          echo "SPA files in wheel: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "ERROR: No SPA assets found in wheel — aborting publish"
            exit 1
          fi

      - name: Publish to TestPyPI (dry run)
        # Best-effort: only works if a TestPyPI pending publisher is configured.
        # Non-blocking so the production publish still runs when it isn't.
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
